name: Build Tauri Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Build Tauri App & Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DevForge Studio v__VERSION__'
          releaseBody: |
            🚀 **DevForge Studio** — Framework Generator untuk Developer Indonesia

            ### ✨ Fitur Utama:
            - 🌐 **Generator Website** — Landing page, Blog, Portfolio, SEO optimized
            - 💻 **Generator Software** — Full-stack, Mobile App, SaaS, E-commerce
            - 🤖 **Generator Agentic AI** — Multi-agent pipeline, RAG system, Chatbot
            - 🚀 **Live Builder** — Orkestrasi 4 agen AI (Arsitek → Coder → QA → DevOps)
            - 📦 **Export ZIP** — Download seluruh project bundle langsung

            ### 🖥️ Cara Install Windows:
            1. Download file `DevForge-Studio_x64_en-US.msi` atau `DevForge-Studio_x64-setup.exe`
            2. Jalankan installer
            3. Buka **DevForge Studio** dari Start Menu

            ### 🌐 Versi Online:
            Akses langsung tanpa install: [budagbogor.github.io/framework2plus](https://budagbogor.github.io/framework2plus)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
