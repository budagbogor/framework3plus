<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevForge — Smart Framework Generator</title>
<script>
window.onerror = function(msg, url, lineNo, columnNo, error) {
  var errNode = document.createElement('div');
  errNode.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;';
  errNode.innerText = 'JS Error: ' + msg + '\nLine: ' + lineNo + '\nCol: ' + columnNo + '\nStack: ' + (error && error.stack);
  document.body.appendChild(errNode);
  return false;
};
window.addEventListener('unhandledrejection', function(event) {
  var errNode = document.createElement('div');
  errNode.style.cssText = 'position:fixed;top:100px;left:0;right:0;background:darkred;color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;';
  errNode.innerText = 'Promise Error: ' + event.reason;
  document.body.appendChild(errNode);
});
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous"></script>
<script src="https://js.puter.com/v2/"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F5;--bg2:#FFFFFF;--bg3:#EAECEB;
  --surface:#FFFFFF;--surface2:#FDFDFD;
  --border:#DDE2E1;--border2:#8E9A98;
  --text:#35627A;--text2:#517182;--text3:#8E9A98;
  --accent:#35627A;--accent-light:rgba(53,98,122,0.1);--accent-mid:#25475A;
  --green:#35627A;--green-light:rgba(53,98,122,0.1);
  --amber:#35627A;--amber-light:rgba(53,98,122,0.1);
  --pink:#35627A;--pink-light:rgba(53,98,122,0.1);
  --red:#35627A;--red-light:rgba(53,98,122,0.1);
  --gold:#35627A;--gold-light:rgba(53,98,122,0.05);
  --font:'Plus Jakarta Sans',sans-serif;
  --font-h:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:10px;--r-lg:16px;--r-xl:24px;
}
[data-theme='dark']{
  --bg:#121C24;--bg2:#182531;--bg3:#1F303F;
  --surface:#182531;--surface2:#1F303F;
  --border:rgba(142,154,152,0.2);--border2:rgba(142,154,152,0.4);
  --text:#F5F5F5;--text2:#A6A9D0;--text3:#8E9A98;
  --accent:#A6A9D0;--accent-light:rgba(166,169,208,0.15);--accent-mid:#8E92BC;
  --green:#A6A9D0;--green-light:rgba(166,169,208,0.15);
  --amber:#A6A9D0;--amber-light:rgba(166,169,208,0.15);
  --pink:#A6A9D0;--pink-light:rgba(166,169,208,0.15);
  --red:#A6A9D0;--red-light:rgba(166,169,208,0.15);
  --gold:#A6A9D0;--gold-light:rgba(166,169,208,0.1);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background-color 0.3s, color 0.3s}

/* grain texture */
body::after{content:'';position:fixed;inset:0;opacity:.025;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:128px;background-repeat:repeat}

#app{width:100%;margin:0 auto;padding:100px 32px 80px}

/* ── Global Navigation ── */
.top-nav{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(var(--bg),0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);z-index:999;display:flex;align-items:center;transition:background-color 0.3s, border-color 0.3s}
.nav-container{width:100%;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;align-items:center}
.nav-actions{display:flex;gap:8px}
.nav-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.15s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{color:var(--text);border-color:var(--border2)}
.nav-btn.ai-active{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.ai-connected{background:var(--green-light);color:var(--green);border-color:var(--green)}

/* ── Mobile Hamburger ── */
.nav-hamburger{display:none;width:32px;height:32px;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;z-index:1001}
.nav-hamburger span{display:block;width:100%;height:2px;background:var(--text);border-radius:2px;transition:all 0.3s}
.nav-hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.active span:nth-child(2){opacity:0}
.nav-hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ── Mobile Dropdown Menu ── */
.nav-mobile-menu{position:fixed;top:70px;left:0;right:0;background:rgba(var(--bg2),0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);transform:translateY(-100%);opacity:0;visibility:hidden;
  transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1);z-index:998;padding:24px;display:flex;flex-direction:column;gap:12px}
.nav-mobile-menu.active{transform:translateY(0);opacity:1;visibility:visible}
.nav-mobile-item{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;
  font-size:14px;font-weight:700;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s}
.nav-mobile-item:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}

/* ── AI Settings Modal ── */
.ai-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:2000;
  display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.ai-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:32px;width:100%;max-width:520px;box-shadow:0 24px 48px rgba(0,0,0,.15);
  animation:fadeDown .25s ease;position:relative}
.ai-modal-title{font-family:var(--font-h);font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px}
.ai-modal-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.5}
.ai-modal-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:none;
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.ai-modal-close:hover{background:var(--border);color:var(--text)}
.ai-field{margin-bottom:16px}
.ai-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:block}
.ai-select,.ai-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;outline:none;
  transition:border-color .2s, box-shadow .2s;appearance:none;cursor:pointer}
.ai-select:focus,.ai-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.ai-input{font-family:var(--mono);font-size:13px;letter-spacing:.03em}
.ai-provider-tabs{display:flex;gap:8px;margin-bottom:20px}
.ai-prov-tab{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--surface);cursor:pointer;text-align:center;transition:all .2s;font-family:var(--font)}
.ai-prov-tab:hover{border-color:var(--border2)}
.ai-prov-tab.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.ai-prov-tab .prov-name{font-size:13px;font-weight:700;display:block}
.ai-prov-tab .prov-url{font-size:10px;color:var(--text3);margin-top:2px}
.ai-prov-tab.active .prov-url{color:var(--accent)}
.ai-row{display:flex;gap:10px}
.ai-row .ai-field{flex:1}
.ai-status-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border);margin-bottom:16px;font-size:13px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.ai-dot.green{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}
.ai-dot.red{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.4)}
.ai-dot.yellow{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.4);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-status-text{flex:1;color:var(--text2)}
.ai-footer{display:flex;gap:10px;margin-top:8px}
.ai-test-btn{padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--bg3);color:var(--text2);font-family:var(--font);font-size:13px;
  font-weight:700;cursor:pointer;transition:all .2s}
.ai-test-btn:hover{border-color:var(--accent);color:var(--accent)}
.ai-save-btn{flex:1;padding:10px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-family:var(--font);font-size:14px;
  font-weight:700;cursor:pointer;transition:all .2s}
.ai-save-btn:hover{opacity:.9;transform:translateY(-1px)}
.ai-usage-note{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.5}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.ai-badge.free{background:rgba(34,197,94,.15);color:#16a34a;border:1px solid rgba(34,197,94,.3)}
.ai-badge.paid{background:var(--accent-light);color:var(--accent);border:1px solid var(--border)}

/* ── Guide Modal ── */
.gd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:3000;
  display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.gd-modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:0;width:100%;max-width:720px;max-height:85vh;box-shadow:0 32px 64px rgba(0,0,0,.2);
  animation:fadeUp .3s ease;position:relative;display:flex;flex-direction:column;overflow:hidden}
.gd-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg3)}
.gd-body{padding:32px;overflow-y:auto;flex:1;background:var(--surface)}
.gd-title{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.gd-close{background:var(--bg);border:1.5px solid var(--border);width:32px;height:32px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text2)}
.gd-close:hover{background:var(--red-light);color:var(--text);border-color:var(--red)}

.wf-container{display:flex;flex-direction:column;gap:20px;margin-top:20px}
.wf-step{display:flex;gap:18px;align-items:flex-start;padding:16px;border-radius:16px;background:var(--bg3);border:1px solid transparent;transition:all .2s}
.wf-step:hover{border-color:var(--accent);background:var(--accent-light)}
.wf-num{width:36px;height:36px;border-radius:12px;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.wf-content{flex:1}
.wf-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text)}
.wf-desc{font-size:13px;color:var(--text2);line-height:1.5}
.gd-section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin:24px 0 12px;display:block}

/* ── Hero / Header ── */
.hero-sec{text-align:center;margin-bottom:32px;animation:fadeDown .5s ease both}
.logo{display:inline-flex;align-items:center;gap:8px;padding:5px 14px 5px 6px;
  border-radius:2px;background:var(--accent-light);border:1px solid var(--border);
  margin-bottom:18px;animation:fadeDown .5s ease both;cursor:pointer;transition:transform 0.15s, box-shadow 0.2s}
.logo:hover{transform:translateY(-1px);box-shadow:0 4px 10px var(--accent-light)}
.logo-dot{width:28px;height:28px;border-radius:2px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:bold}
.logo-text{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-h)}
h1{font-family:var(--font-h);font-size:clamp(32px,6vw,56px);font-weight:700;line-height:1.1;letter-spacing:-.03em;
  animation:fadeDown .5s .08s ease both;text-transform:uppercase}
h1 em{font-style:normal;color:var(--accent);text-shadow:0 0 20px var(--accent-light)}
[data-theme='dark'] h1 em{text-shadow:0 0 30px rgba(0,240,255,0.4)}
.subtitle{margin-top:16px;font-size:16px;color:var(--text2);line-height:1.6;max-width:640px;margin-inline:auto;
  animation:fadeDown .5s .15s ease both}

/* ── Mode cards ── */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin:32px 0 24px;animation:fadeUp .5s .2s ease both}
.mode-card{border:1px solid var(--border);border-radius:6px;padding:32px 24px;cursor:pointer;
  background:var(--surface);transition:all .3s;position:relative;overflow:hidden;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,0.02)}
.mode-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(53,98,122,.1);transform:translateY(-4px)}
.mode-card.active{border-color:var(--accent);background:var(--accent-light);box-shadow:0 8px 24px var(--accent-light)}
.mode-card.active.green-mode{border-color:var(--accent);background:var(--accent-light);box-shadow:0 8px 24px var(--accent-light)}
.mode-card.active.pink-mode{border-color:var(--accent);background:var(--accent-light);box-shadow:0 8px 24px var(--accent-light)}
.mode-card.active.amber-mode{border-color:var(--accent);background:var(--accent-light);box-shadow:0 8px 24px var(--accent-light)}
.mode-badge{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-family:var(--font-h);
  padding:4px 12px;border-radius:2px;display:inline-block;margin-bottom:14px;border:1px solid currentColor}
.badge-sdlc{background:transparent;color:var(--accent)}
.badge-adlc{background:transparent;color:var(--green)}
.mode-card h3{font-family:var(--font-h);font-size:20px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.mode-card p{font-size:14px;color:var(--text2);line-height:1.6}
.mode-check{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:2px;
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;transition:all .3s}
.mode-card.active .mode-check,.mode-card.active.green-mode .mode-check,.mode-card.active.amber-mode .mode-check,.mode-card.active.pink-mode .mode-check{color:#fff;background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--accent)}
.start-row{text-align:center;animation:fadeUp .4s .25s ease both}

/* ── Progress ── */
.progress-wrap{margin-bottom:28px}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.progress-count{font-size:12px;color:var(--text3);font-family:var(--mono)}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease;background:var(--accent)}
.progress-fill.green{background:var(--green)}
.step-crumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.crumb{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;
  background:var(--bg3);color:var(--text3);transition:all .2s}
.crumb.done{background:var(--accent-light);color:var(--accent)}
.crumb.done.green{background:var(--green-light);color:var(--green)}
.crumb.active{background:var(--accent);color:#fff}
.crumb.active.green{background:var(--green);color:#fff}

/* ── Question card ── */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:32px;margin-bottom:20px;animation:fadeIn .3s ease;box-shadow:0 6px 24px var(--accent-light)}
.q-section{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:var(--accent);margin-bottom:8px;font-family:var(--font-h)}
.q-section.green{color:var(--green)}
.q-title{font-family:var(--font-h);font-size:28px;font-weight:700;margin-bottom:12px;line-height:1.3;letter-spacing:-.02em;text-transform:uppercase}
.q-desc{font-size:15px;color:var(--text2);margin-bottom:28px;line-height:1.6}

/* text input */
.q-textarea{width:100%;border:1px solid var(--border);border-radius:2px;
  padding:16px;font-family:var(--mono);font-size:14px;color:var(--text);
  background:var(--bg3);resize:vertical;min-height:120px;outline:none;transition:all .3s}
.q-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}

/* ── Tech option card (the magic) ── */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.tech-card{border:1px solid var(--border);border-radius:4px;padding:0;
  cursor:pointer;background:var(--surface);transition:all .25s;overflow:hidden;display:flex;flex-direction:column}
.tech-card:hover{border-color:var(--accent);box-shadow:0 6px 16px var(--accent-light)}
.tech-card.selected{border-color:var(--accent);background:var(--accent-light);box-shadow:0 6px 16px var(--accent-light)}
.tech-card.selected.green{border-color:var(--green);background:var(--green-light);box-shadow:0 6px 16px var(--green-light)}
.tech-card.single-type{cursor:pointer}

.tc-main{display:flex;align-items:flex-start;gap:14px;padding:16px;flex:1}
.tc-icon{width:42px;height:42px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border2)}
.tc-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.tc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.tc-name{font-family:var(--font-h);font-size:16px;font-weight:700;text-transform:uppercase}
.tc-right{display:flex;align-items:center;gap:6px;margin-left:auto}

/* recommendation badges */
.rec-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.04em}
.rec-best{background:var(--amber-light);color:var(--amber);border:1px solid var(--border)}
.rec-good{background:var(--green-light);color:var(--green);border:1px solid var(--border)}
.rec-adv{background:var(--accent-light);color:var(--accent);border:1px solid var(--border)}

.tc-tagline{font-size:12px;color:var(--text2)}
.tc-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  flex-shrink:0;transition:all .18s;color:transparent}
.tech-card.selected .tc-check{background:var(--accent);border-color:var(--accent);color:#fff}
.tech-card.selected.green .tc-check{background:var(--green);border-color:var(--green);color:#fff}

/* expandable detail */
.tc-detail{display:none;border-top:1px solid var(--border);padding:12px 14px;background:var(--bg3)}
.tech-card.open .tc-detail{display:block}
.tc-detail-inner{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tc-pros,.tc-cons{padding:10px 12px;border-radius:var(--r)}
.tc-pros{background:var(--green-light)}
.tc-cons{background:var(--red-light)}
.tc-phead{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.tc-pros .tc-phead{color:var(--green)}
.tc-cons .tc-phead{color:var(--red)}
.tc-plist{list-style:none;padding:0}
.tc-plist li{font-size:11px;padding:2px 0;color:var(--text2);display:flex;gap:5px;align-items:flex-start;line-height:1.4}
.tc-plist li::before{content:'•';flex-shrink:0;font-weight:700}
.tc-pros .tc-plist li::before{color:var(--green)}
.tc-cons .tc-plist li::before{color:var(--red)}
.tc-ideal{font-size:11px;color:var(--text2);padding-top:8px;border-top:1px solid var(--border);line-height:1.5}
.tc-ideal strong{color:var(--text);font-weight:600}
.tc-toggle{font-size:11px;color:var(--text3);cursor:pointer;padding:0;background:none;border:none;
  font-family:var(--font);display:flex;align-items:center;gap:4px;transition:color .15s}
.tc-toggle:hover{color:var(--accent)}

/* simple chip mode */
.chip-grid{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 14px;border-radius:40px;border:1.5px solid var(--border);
  background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;
  color:var(--text2);transition:all .15s;font-family:var(--font)}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.chip.sel.green{border-color:var(--green);background:var(--green-light);color:var(--green)}

/* scale cards */
.scale-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scale-card{border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px;
  cursor:pointer;background:var(--surface);transition:all .18s}
.scale-card:hover{border-color:var(--border2)}
.scale-card.selected{border-color:var(--accent);background:var(--accent-light)}
.scale-card.selected.green{border-color:var(--green);background:var(--green-light)}
.scale-icon{font-size:22px;margin-bottom:6px}
.scale-name{font-size:13px;font-weight:700;margin-bottom:3px}
.scale-desc{font-size:11px;color:var(--text2);line-height:1.4}

/* nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.nav-row .btn-group{display:flex;gap:8px;align-items:center}
.btn{padding:10px 22px;border-radius:var(--r);font-family:var(--font);font-size:13px;
  font-weight:700;cursor:pointer;border:none;transition:all .15s;letter-spacing:.02em}
.btn-back{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)}
.btn-back:hover{color:var(--text);border-color:var(--border2)}
.btn-next{background:var(--accent);color:#fff}
.btn-next:hover{background:var(--accent-mid);transform:translateY(-1px)}
.btn-next.green{background:var(--green)}
.btn-generate{padding:13px 32px;font-size:14px;background:var(--accent);color:#fff;
  box-shadow:0 4px 20px rgba(45,91,227,.25)}
.btn-generate:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,91,227,.35)}
.btn-generate.green{background:var(--green);box-shadow:0 4px 20px rgba(26,143,94,.25)}
.step-info{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* ── Output ── */
.out-wrap{animation:fadeIn .4s ease}
.out-hero{background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:32px;margin-bottom:24px;
  position:relative;overflow:hidden;box-shadow:0 6px 20px var(--accent-light), inset 0 0 1px var(--accent-light)}
.out-hero::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent)}
.out-hero.green{border-color:var(--green);box-shadow:0 6px 20px var(--green-light), inset 0 0 1px var(--green-light)}
.out-hero.green::before{background:var(--green)}
.out-hero.amber{border-color:var(--amber);box-shadow:0 6px 20px var(--amber-light), inset 0 0 1px var(--amber-light)}
.out-hero.amber::before{background:var(--amber)}
.out-hero-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;font-family:var(--font-h)}
.out-hero.green .out-hero-label{color:var(--green)}
.out-hero.amber .out-hero-label{color:var(--amber)}
.out-hero-name{font-family:var(--font-h);font-size:32px;font-weight:700;margin-bottom:12px;text-transform:uppercase;color:var(--text)}
.out-hero-meta{font-size:13px;display:flex;flex-wrap:wrap;gap:12px}
.out-hero-chip{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:2px;font-family:var(--mono)}
.out-hero-name{font-size:22px;font-weight:800;margin-bottom:4px}
.out-hero-meta{font-size:12px;opacity:1;display:flex;flex-wrap:wrap;gap:12px}
.out-hero-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;color:inherit}
.out-hero.green .out-hero-name, .out-hero.amber .out-hero-name, .out-hero.pink .out-hero-name {color: #fff}
.out-hero.green .out-hero-label, .out-hero.amber .out-hero-label, .out-hero.pink .out-hero-label {color: rgba(255,255,255,0.8); text-shadow: none}
.out-hero.green .out-hero-chip, .out-hero.amber .out-hero-chip, .out-hero.pink .out-hero-chip {background:rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3)}

.tab-nav{display:flex;gap:8px;background:var(--bg3);padding:6px;border-radius:4px;
  border:1px solid var(--border);flex-wrap:wrap;margin-bottom:20px}
.tab-nav-btn{padding:10px 20px;border-radius:2px;border:1px solid transparent;background:transparent;
  color:var(--text3);font-family:var(--font-h);font-size:14px;font-weight:700;text-transform:uppercase;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;flex:1;text-align:center}
.tab-nav-btn.active{background:var(--surface);color:var(--accent);border-color:var(--border);box-shadow:0 2px 8px var(--accent-light)}
.out-panel{display:none}
.out-panel.active{display:block;animation:fadeIn .25s ease}

.out-section{background:rgba(255,255,255,0.02);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:4px;
  padding:24px;margin-bottom:16px}
.out-sec-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.out-sec-icon{width:40px;height:40px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:20px;background:var(--accent-light);flex-shrink:0;border:1px solid var(--accent);box-shadow:inset 0 0 10px rgba(0,240,255,0.1)}
.out-sec-icon.green{background:var(--green-light);border-color:var(--green);box-shadow:inset 0 0 10px rgba(57,255,20,0.1)}
.out-sec-icon.amber{background:var(--amber-light);border-color:var(--amber);box-shadow:inset 0 0 10px rgba(252,238,10,0.1)}
.out-sec-title{font-family:var(--font-h);font-size:18px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.out-sec-sub{font-size:11px;color:var(--text2);margin-top:1px}

.code-block{background:#0d1117;border:1px solid rgba(255,255,255,0.05);border-radius:var(--r-lg);overflow:hidden;margin-top:4px}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.08)}
.code-lang-tag{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase}
.copy-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.15);
  background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-family:var(--font);
  transition:all .15s;font-weight:600}
.copy-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.copy-btn.ok{color:#4dd;border-color:#4dd}
pre{padding:16px;overflow-x:auto;overflow-y:auto;font-family:var(--mono);font-size:11.5px;line-height:1.75;
  color:#c8d3e0;max-height:400px;white-space:pre}

/* stack recommendation */
.stack-recs{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.stack-rec{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 12px;position:relative}
.stack-rec-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text3);margin-bottom:4px}
.stack-rec-name{font-size:13px;font-weight:700;margin-bottom:2px}
.stack-rec-why{font-size:10px;color:var(--text2);line-height:1.4}
.stack-rec-star{position:absolute;top:8px;right:8px;font-size:12px}

/* phase list in PRD view */
.phase-list{display:flex;flex-direction:column;gap:7px}
.phase-item{display:flex;gap:10px;background:var(--bg3);border-radius:var(--r);padding:11px 12px;align-items:flex-start}
.phase-num{min-width:24px;height:24px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;
  background:var(--accent-light);color:var(--accent)}
.phase-num.green{background:var(--green-light);color:var(--green)}
.phase-title{font-size:13px;font-weight:700;margin-bottom:2px}
.phase-desc{font-size:11px;color:var(--text2);line-height:1.5}
.phase-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.phase-tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;
  background:var(--accent-light);color:var(--accent)}
.phase-tag.green{background:var(--green-light);color:var(--green)}

.prose-out{font-size:13px;color:var(--text2);line-height:1.8}
.prose-out h3{font-size:14px;font-weight:700;color:var(--text);margin:14px 0 5px}
.prose-out strong{color:var(--text);font-weight:600}

/* restart */
.restart-row{text-align:center;margin-top:28px}
.btn-restart{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);font-size:12px;padding:9px 22px}
.btn-restart:hover{border-color:var(--border2);color:var(--text)}

/* ── Animations ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Desktop / Amber mode ── */
/* ── Mode Transitions ── */
.badge-adlc{color:var(--accent);border-color:var(--accent)}
.badge-desktop{color:var(--accent);border-color:var(--accent)}
.progress-fill.green,.progress-fill.amber,.progress-fill.pink{background:var(--accent);box-shadow:0 0 10px var(--accent-light)}
.crumb.done.green,.crumb.done.amber,.crumb.done.pink{background:var(--accent-light);color:var(--accent)}
.crumb.active.green,.crumb.active.amber,.crumb.active.pink{background:var(--accent);color:#fff}
.q-section.green,.q-section.amber,.q-section.pink{color:var(--accent)}
.tech-card.selected.green,.tech-card.selected.amber,.tech-card.selected.pink{border-color:var(--accent);background:var(--accent-light)}
.btn-next.green,.btn-next.amber,.btn-next.pink{background:var(--accent)}
.btn-next.green:hover,.btn-next.amber:hover,.btn-next.pink:hover{background:var(--accent-mid)}
.out-hero.green,.out-hero.amber,.out-hero.pink{background:linear-gradient(135deg, var(--accent), var(--accent-mid)); color: #fff; border: none}
.out-sec-icon.green,.out-sec-icon.amber,.out-sec-icon.pink{background:var(--accent-light);color:var(--accent);border-color:var(--border)}

/* ── Website / Theme mode (formerly pink) ── */
.badge-website{background:var(--accent-light);color:var(--accent);border:1px solid var(--border)}
.mode-card.active.pink-mode{border-color:var(--accent);background:var(--accent-light)}
.mode-card.active.pink-mode .mode-check{color:#fff;background:var(--accent);border-color:var(--accent)}
.progress-fill.pink{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.crumb.done.pink{border-color:var(--accent);color:var(--accent)}
.crumb.active.pink{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--accent)}
.q-section.pink{color:var(--accent)}
.tech-card.selected.pink{border-color:var(--accent);background:var(--accent-light)}
.tech-card.selected.pink .tc-check{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sel.pink{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.scale-card.selected.pink{border-color:var(--accent);background:var(--accent-light)}
.btn-next.pink{background:var(--accent)}
.btn-next.pink:hover{background:var(--accent-mid);box-shadow:0 0 15px var(--accent-light)}
.btn-generate.pink{background:var(--accent);box-shadow:0 4px 20px var(--accent-light)}
.btn-generate.pink:hover{box-shadow:0 8px 28px var(--accent-mid)}
.rec-badge.pink{background:var(--accent-light);color:var(--accent);border:1px solid var(--border)}
.phase-num.pink{background:var(--accent-light);color:var(--accent)}
.phase-tag.pink{background:var(--accent-light);color:var(--accent)}
.out-hero.pink{background:linear-gradient(135deg,var(--accent),var(--accent-mid))}
.out-sec-icon.pink{background:var(--accent-light)}

/* ── Level toggle ── */
.level-toggle{display:flex;align-items:center;gap:6px;margin-bottom:16px;justify-content:center;animation:fadeUp .5s .18s ease both}
.level-label{font-size:12px;font-weight:700;color:var(--text2);margin-right:4px}
.level-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);
  font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;
  transition:border-color 0.2s, background 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
  color:var(--text2);outline:none;user-select:none}
.level-btn:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.level-btn.active{
  border-color:var(--accent);background:var(--accent);color:#fff;
  box-shadow:0 4px 12px var(--accent-light);
  transform:translateY(-2px) scale(1.04)}

/* ── Quick start ── */
.quick-start-section{margin-top:40px;animation:fadeUp .5s .35s ease both}
.qs-title{font-family:var(--font-h);font-size:16px;font-weight:700;color:var(--text2);text-align:center;margin-bottom:20px;text-transform:uppercase;letter-spacing:.05em}
.qs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.qs-card{border:1px solid var(--border);border-radius:4px;padding:20px 16px;text-align:center;
  cursor:pointer;background:rgba(255,255,255,0.02);backdrop-filter:blur(5px);transition:all .3s}
.qs-card:hover{border-color:var(--accent);box-shadow:0 8px 24px var(--accent-light);transform:translateY(-4px)}
.qs-icon{font-size:32px;margin-bottom:12px}
.qs-name{font-family:var(--font-h);font-size:14px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.02em}
.qs-desc{font-size:12px;color:var(--text3);line-height:1.5;font-family:var(--mono)}

@media(max-width:900px){
  .mode-grid{grid-template-columns:1fr}
  .tech-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .nav-container{padding:0 20px}
  .nav-actions{display:none}
  .nav-hamburger{display:flex}
  .logo-text{font-size:12px}
  .tech-grid{grid-template-columns:1fr}
  .tc-detail-inner{grid-template-columns:1fr}
  .scale-grid{grid-template-columns:1fr}
  .stack-recs{grid-template-columns:repeat(2,1fr)}
  .qs-grid{grid-template-columns:1fr 1fr}
}
/* ── Builder Panel UI — World Class ── */

.builder-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 180px);
    margin: 20px;
    gap: 20px;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.builder-sidebar {
    background: rgba(13, 17, 23, 0.4);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.builder-head {
    padding: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.builder-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
}

.file-tree {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.file-item {
    padding: 12px 16px;
    margin: 4px 0;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
}

.file-item:hover {
    background: rgba(0, 240, 255, 0.05);
    color: var(--text);
}

.file-item.active {
    background: rgba(0, 240, 255, 0.1);
    color: var(--accent);
    box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
}

.builder-main {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 0;
}

.fullscreen-mode {
    position: fixed !important;
    top: 0;
    left: 0;
    width: 100vw !important;
    height: 100vh !important;
    z-index: 99999 !important;
    border-radius: 0 !important;
    margin: 0 !important;
}

.terminal-panel {
    height: 300px;
    background: #010409;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.term-body {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
}

.term-line { margin-bottom: 8px; border-left: 2px solid transparent; padding-left: 12px; }
.term-ts { color: rgba(255,255,255,0.3); font-size: 11px; margin-right: 12px; }
.term-msg.agent { color: #58a6ff; }
.term-msg.success { color: #3fb950; font-weight: 600; border-left-color: #3fb950; }
.term-msg.info { color: #8b949e; }
.term-msg.error { color: #f85149; font-weight: 600; background: rgba(248, 81, 73, 0.1); border-radius: 4px; padding: 2px 8px; }

.builder-empty {
    height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
}

.builder-empty-icon {
    font-size: 80px;
    margin-bottom: 30px;
    animation: float 4s ease-in-out infinite;
}

.term-toolbar {
    display: flex;
    gap: 12px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.03);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    align-items: center;
}

.term-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text2);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.term-btn:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
}

.term-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-light);
}

.term-btn.preview-btn {
    margin-left: auto;
    background: linear-gradient(135deg, #00f0ff, #0072ff);
    color: #000;
    border: none;
}

.term-btn.preview-btn:hover {
    opacity: 0.9;
    transform: scale(1.05);
}

.chat-container {
    margin-top: 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.chat-input-row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
}

.chat-input-field {
    flex: 1;
    background: rgba(0, 0, 0, 0.3);
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px 18px;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.chat-input-field:focus {
    border-color: var(--accent);
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 15px var(--accent-light);
}

.chat-send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
}

.chat-send-btn:hover {
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 5px 15px var(--accent-light);
}

.chat-send-btn:active {
    transform: scale(0.95);
}

.workflow-steps {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-bottom: 20px;
}

.step-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 10px 15px;
    opacity: 0.4;
    transition: all 0.3s;
}

.step-item.active {
    opacity: 1;
    border-color: var(--accent);

function initTheme(){
  if(localStorage.getItem('theme')==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeBtn').textContent='☀️ Terang';
  }
}
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  if(isDark){
    html.removeAttribute('data-theme');
    localStorage.setItem('theme','light');
    document.getElementById('themeBtn').textContent='🌙 Gelap';
  }else{
    html.setAttribute('data-theme','dark');
    localStorage.setItem('theme','dark');
    document.getElementById('themeBtn').textContent='☀️ Terang';
  }
}
function goHome(){
  Object.assign(S,{mode:null,step:0,answers:{},generating:false,generated:null,activeTab:null});

}

function modeLabel(){return isGreen()?'🤖 Agentic AI':isWebsite()?'🌍 Website':isAmber()?'🖥️ Desktop App':'⚡ Software Build'}
function gc(base,green){return isGreen()?green:base}

function getActiveSteps(){
  const all = isGreen() ? ADLC_STEPS : isWebsite() ? WEBSITE_STEPS : SDLC_STEPS;
  return all.filter(s => !s.showIf || s.showIf(S.answers));
}

function setLevel(l){
  S.level=l;
  // Surgical update — only toggle .active on level buttons, no full page re-render
  document.querySelectorAll('.level-btn').forEach(btn=>{
    const isActive = btn.getAttribute('data-level')===l;
    btn.classList.toggle('active', isActive);
  });
  // If currently inside wizard step, re-render just the question body (tech filters change)
  if(S.mode && !S.generating && !S.generated){
    const steps=getActiveSteps();
    const q=steps[S.step];
    if(q && q.type==='techcard'){
      const body=document.getElementById('q-body');
      if(body) body.innerHTML=renderQBody(q);
    }
  }
}

    'Mobile App':{mode:'sdlc', file:'mobileapp.json', answers:{projectName:'My Mobile App',appType:'mobile',audience:'b2c',frontend:['expo'],backend:['supabase-edge'],database:['supabase'],uiLib:['chakra'],auth:['supabase-auth'],payment:[],deployment:['vercel'],scale:'mvp',outputPref:['structure','prd','prompts']}},

  };
  const t=T[name]; if(!t)return;
  
  S.mode=t.mode;

      const res = await fetch(`templates/${t.file}?v=${Date.now()}`);

      S.generating = false;

          addBuildLog(`✅ Template instan '${name}' berhasil dimuat tanpa waktu tunggu!`, "success");
          addBuildLog(`💡 File sudah langsung tersedia di Workspace Explorer.`, "info");
          
          if (S.virtualWorkspace['package.json']) {
              S.autoDeploying = true;
              render();
              execTerminalCmd('install').then(() => {
                  if (S.isInstalled) {
                      execTerminalCmd('dev').then(() => {
                          S.autoDeploying = false;
                          render();
                      });
                  } else {
                      S.autoDeploying = false;
                      render();
                  }
              }).catch(() => {
                  S.autoDeploying = false;
                  render();
              });
          } else {
              addBuildLog(`💡 Selesai! Silakan klik tombol '🌐 Preview' untuk melihat hasilnya.`, "info");
          }
      }, 300);
      
  } catch (err) {

      S.generating = false;
      render();
  }
}

function renderQBody(q){
  const val=S.answers[q.key]||(q.multi||q.type==='multicheck'?[]:'');
  if(q.type==='text')
    return `<textarea class="q-textarea" id="qt" placeholder="${q.placeholder}" oninput="S.answers['${q.key}']=this.value">${val}</textarea>`;

  if(q.type==='scale')
    return `<div class="scale-grid">${q.options.map(o=>{
      const sel=(val===o.val)?`selected ${modeColorClass()}`:''
      return `<div class="scale-card ${sel}" onclick="setScale('${q.key}','${o.val}')">
        <div class="scale-icon">${o.icon}</div>
        <div class="scale-name">${o.name}</div>
        <div class="scale-desc">${o.desc}</div>
      </div>`
    }).join('')}</div>`;

  if(q.type==='multicheck')
    return `<div class="chip-grid">${q.options.map(o=>{
      const sel=(val||[]).includes(o.val)?`sel ${modeColorClass()}`:''
      return `<button class="chip ${sel}" onclick="toggleChip('${q.key}','${o.val}')">${o.icon} ${o.label}</button>`
    }).join('')}</div>`;

  if(q.type==='techcard'){
    let techs=TECH[q.techKey]||[];
    // Filter by level (Perbedaan radikal per level)
    if(S.level==='beginner') {
      // Pemula hanya melihat opsi "Terbaik" agar tidak bingung
      const bests = techs.filter(t=>t.rec==='best');
      techs = bests.length > 0 ? bests : techs.filter(t=>t.rec!=='adv');
    } else if(S.level==='intermediate') {
      // Menengah melihat standar dan populer, menyembunyikan yang advanced
      techs = techs.filter(t=>t.rec!=='adv');
    }
    // Expert melihat semua opsi termasuk yang paling rumit (tanpa filter)
    
    // auto-recommend based on prior answers
    const recs=smartRecs(q.techKey,S.answers);
    return `
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500">
        ${q.multi?`Pilih ${q.max||'beberapa'} — klik "Lihat detail" untuk perbandingan`:'Pilih satu'}
      </div>
      <div class="tech-grid">${techs.map((t,i)=>{
        const selArr=Array.isArray(val)?val:[val];
        const isSel=selArr.includes(t.val);
        const selCls=isSel?`selected ${modeColorClass()}`:''
        const recInfo=recs[t.val];
        const isTopRec=recInfo==='top';
        return `<div class="tech-card ${selCls}" id="tc-${q.key}-${i}">
          <div class="tc-main" onclick="${q.multi?`toggleTech('${q.key}','${t.val}',${q.max||99})`:`setSingle('${q.key}','${t.val}')`}">
            <div class="tc-icon">${t.icon}</div>
            <div class="tc-body">
              <div class="tc-top">
                <span class="tc-name">${t.name}</span>
                ${isTopRec?`<span class="rec-badge rec-best">⭐ Rekomendasi untukmu</span>`:
                  t.rec==='best'?`<span class="rec-badge rec-best">${t.recLabel}</span>`:
                  t.rec==='good'?`<span class="rec-badge rec-good">${t.recLabel}</span>`:
                  `<span class="rec-badge rec-adv">${t.recLabel}</span>`}
              </div>
              <div class="tc-tagline">${t.tagline}</div>
            </div>
            <div class="tc-right">
              <div class="tc-check">${isSel?'✓':''}</div>
            </div>
          </div>
          <div class="tc-detail" id="td-${q.key}-${i}">
            <div class="tc-detail-inner">
              <div class="tc-pros">
                <div class="tc-phead">Kelebihan</div>
                <ul class="tc-plist">${t.pros.map(p=>`<li>${p}</li>`).join('')}</ul>
              </div>
              <div class="tc-cons">
                <div class="tc-phead">Kekurangan</div>
                <ul class="tc-plist">${t.cons.map(c=>`<li>${c}</li>`).join('')}</ul>
              </div>
            </div>
            <div class="tc-ideal">${t.ideal}</div>
          </div>
          <div style="padding:6px 14px;border-top:1px solid var(--border);background:var(--bg3);display:flex;justify-content:space-between;align-items:center">
            <button class="tc-toggle" onclick="toggleDetail('td-${q.key}-${i}',this)">▼ Lihat detail & perbandingan</button>
            ${isSel?`<span style="font-size:10px;font-weight:700;color:${isGreen()?'var(--green)':isAmber()?'var(--amber)':'var(--accent)'}">${q.multi?'✓ Dipilih':'✓ Dipilih'}</span>`:''}

  }
  return '';
}

function toggleDetail(id,btn){
  const el=document.getElementById(id);
  const card=el.closest('.tech-card');
  const isOpen=card.classList.contains('open');
  card.classList.toggle('open',!isOpen);
  btn.textContent=isOpen?'▼ Lihat detail & perbandingan':'▲ Tutup detail';
}

// Smart recommendation engine
function smartRecs(techKey, answers){
  const recs={};
  const scale=answers.scale||answers.complexity||'';
  const appType=answers.appType||'';
  const frontend=(answers.frontend||[]);
  const db=(answers.database||[]);
  const llm=answers.llm||'';

  if(techKey==='frontend'){
    if(appType==='mobile') recs['expo']='top';
    else if(appType==='webapp'||appType==='fullstack') recs['nextjs']='top';
    else recs['react']='top';
  }
  if(techKey==='backend'){
    if(frontend.includes('nextjs')||appType==='fullstack') recs['nextjs-api']='top';
    else if(answers.aiFeatures) recs['fastapi']='top';
    else recs['nodejs-express']='top';
  }
  if(techKey==='database'){
    if(scale==='mvp'||scale==='poc'||scale==='simple') recs['supabase']='top';
    else if(appType==='mobile') recs['firebase']='top';
    else recs['supabase']='top';
  }
  if(techKey==='uiLib') recs['tailwind-shadcn']='top';
  if(techKey==='auth'){
    if(db.includes('supabase')) recs['supabase-auth']='top';
    else if(frontend.includes('nextjs')) recs['nextauth']='top';
    else recs['clerk']='top';
  }
  if(techKey==='deployment'){
    if(frontend.includes('nextjs')) recs['vercel']='top';
    else recs['railway']='top';
  }
  if(techKey==='llm') recs['claude']='top';
  if(techKey==='orchestration'){
    if(answers.agentType==='rag') recs['langchain']='top';
    else if(answers.complexity==='poc') recs['langchain']='top';
    else recs['langgraph']='top';
  }
  if(techKey==='memory'){
    recs['context']='top';
    if(answers.agentType==='rag') recs['supabase-vector']='top';
  }
  if(techKey==='agentTools'){
    recs['web-search']='top';
    if(answers.agentType==='coding') recs['code-exec']='top';
  }
  if(techKey==='desktop'){
    recs['electron']='top';
  }
  if(techKey==='installer'){
    const fw=answers.desktopFramework||'';
    if(fw==='electron') recs['electron-builder']='top';
    else if(fw==='tauri') recs['tauri-bundler']='top';
    else recs['electron-builder']='top';
  }
  if(techKey==='payment'){
    const audience=answers.audience||'';
    if(audience==='b2c') recs['midtrans']='top';
    else recs['stripe']='top';
  }

  // --- Website specific recs ---
  if(techKey==='webBuilder'){
    const wt = answers.webType||'';
    if(wt==='landing'||wt==='blog') recs['astro']='top';
    else if(wt==='profile'||wt==='docs') recs['nextjs-static']='top';
    else recs['astro']='top';
  }
  if(techKey==='cms'){
    const wt = answers.webType||'';
    if(wt==='blog'||wt==='documentation') recs['markdown']='top';
    else recs['sanity']='top';
  }
  if(techKey==='form') recs['formspree']='top';
  if(techKey==='animation') recs['framer-motion']='top';

  return recs;
}

function setScale(k,v){S.answers[k]=v;render();setTimeout(nextStep,350)}
function setSingle(k,v){S.answers[k]=v;render();setTimeout(nextStep,350)}
function toggleChip(k,v){
  let a=S.answers[k]||[];
  S.answers[k]=a.includes(v)?a.filter(x=>x!==v):[...a,v];
  render();
}
function toggleTech(k,v,max){
  let a=S.answers[k]||[];
  if(a.includes(v)){S.answers[k]=a.filter(x=>x!==v)}
  else if(a.length<max){S.answers[k]=[...a,v]}
  render();
}
function nextStep(){
  const steps=getActiveSteps();
  if(S.step<steps.length-1){S.step++;render();window.scrollTo(0,0)}
}
function prevStep(){if(S.step>0){S.step--;render();window.scrollTo(0,0)}}

Kamu adalah ${name}.
Misi: [Jelaskan misi agen Anda di sini]
Yang Boleh Dilakukan: ${(a.agentTools||['web search']).map(t=>`- ${t}`).join('\n')}

            "type": "object",
            "properties": {
                "query": {"type": "string", "description": "Kata kunci pencarian"}
            },
            "required": ["query"]
        }
    }
]

audit_log = []

def log_action(action: str, details: Any):
    entry = {"action": action, "details": details}
    audit_log.append(entry)
    print(f"[AUDIT] {action}: {json.dumps(details, ensure_ascii=False)[:100]}")

def execute_tool(name: str, inputs: dict) -> str:
    log_action("tool_call", {"tool": name, "inputs": inputs})
    if name == "web_search":
        return f"[Hasil pencarian virtual: {inputs.get('query', '')}]"
    return "Tool belum diimplementasikan"

class Agent:
    def __init__(self):
        self.conversation = []
        self.max_iterations = 5

    def run(self, task: str) -> str:
        print(f"🤖 Memulai task: {task}\\n")
        self.conversation.append({"role": "user", "content": task})
        
        for i in range(self.max_iterations):
            log_action("iteration_start", {"step": i + 1})
            response = client.messages.create(
                model="${llmModel}",
                max_tokens=2048,
                system=SYSTEM_PROMPT,
                tools=tools,
                messages=self.conversation
            )
            
            if response.stop_reason == "end_turn":
                return response.content[0].text
                
            if response.stop_reason == "tool_use":
                tool_results = []
                for block in response.content:
                    if block.type == "tool_use":
                        res = execute_tool(block.name, block.input)
                        tool_results.append({
                            "type": "tool_result",
                            "tool_use_id": block.id,
                            "content": res
                        })
                self.conversation.append({"role": "assistant", "content": response.content})
                self.conversation.append({"role": "user", "content": tool_results})
        return "Limit iterasi tercapai."

if __name__ == "__main__":

async function initWebContainer() {
    if (window.webcontainerInstance) return window.webcontainerInstance;
    try {
        addBuildLog("⏳ Memuat WebContainer API...", "info");
        const module = await import('https://esm.sh/@webcontainer/api');
        const WebContainer = module.WebContainer;
        
        addBuildLog("⏳ Booting WebContainer environment...", "info");
        window.webcontainerInstance = await WebContainer.boot();
        addBuildLog("✅ WebContainer siap beroperasi!", "success");
        
        window.webcontainerInstance.on('server-ready', (port, url) => {
            addBuildLog(`✅ Dev server siap di port ${port}!`, "success");
            addBuildLog(`   ➜ URL: ${url}`, "info");
            S.isDevRunning = true;
            window.webcontainerUrl = url;
            render();
            const btn = document.getElementById('btnTogglePreview');
            if (btn && btn.innerHTML.includes('Preview')) {
                togglePreview();
            } else {
                openLivePreview(url);
            }
        });
        
        return window.webcontainerInstance;
    } catch (e) {
        addBuildLog(`❌ Gagal inisialisasi WebContainer: ${e.message}`, "error");
        return null;
    }
}

function virtualWorkspaceToTree(workspace) {
    const tree = {};
    for (const path in workspace) {
        const parts = path.split('/');
        let current = tree;
        for (let i = 0; i < parts.length; i++) {
            const part = parts[i];
            if (i === parts.length - 1) {
                current[part] = { file: { contents: workspace[path] } };
            } else {
                if (!current[part]) {
                    current[part] = { directory: {} };
                }
                current = current[part].directory;
            }
        }
    }
    return tree;
}

async function execTerminalCmd(cmd) {
    if (S.building) {
        const msg = "⚠️ Tunggu hingga AI selesai membangun proyek terlebih dahulu.";
        addBuildLog(msg, "amber");
        alert(msg);
        return;
    }

    const hasFiles = Object.keys(S.virtualWorkspace).length > 0;

    if (cmd === 'install') {
        if (!hasFiles) {
            const msg = "❌ Virtual workspace masih kosong. Jalankan pembangunan otonom terlebih dahulu.";
            addBuildLog(msg, "error");
            alert(msg);
            return;
        }

        if (S.isNative && typeof invoke !== 'undefined') {
            addBuildLog("📦 Menjalankan 'npm install' secara native...", "agent");
            try {
                const targetCwd = S.workspacePath && S.generated && S.generated.name ? `${S.workspacePath}/${S.generated.name}` : ".";
                const isWin = navigator.userAgent.includes('Win');
                const execCmd = isWin ? 'cmd' : 'npm';
                const execArgs = isWin ? ['/c', 'npm', 'install'] : ['install'];
                
                await invoke('execute_command', { cmd: execCmd, args: execArgs, cwd: targetCwd });
                
                S.isInstalled = true;
                addBuildLog("✅ Instalasi native selesai.", "success");
                addBuildLog("💡 Klik '🚀 dev' untuk memulai server lokal.", "info");
                render();
            } catch (err) {
                const msg = `❌ Error eksekusi: ${err}`;
                addBuildLog(msg, "error");
                alert(msg);
            }
        } else {
            addBuildLog("📦 Inisialisasi Environment WebContainer...", "agent");
            const wc = await initWebContainer();
            if (!wc) {
                alert("❌ Gagal memuat WebContainer API. Pastikan browser Anda mendukung fitur ini.");
                return;
            }
            
            addBuildLog("⚙️  Menulis file ke dalam memori browser...", "info");
            const tree = virtualWorkspaceToTree(S.virtualWorkspace);
            await wc.mount(tree);
            
            addBuildLog("📦 $ npm install --no-progress", "agent");
            const installProcess = await wc.spawn('npm', ['install', '--no-progress', '--no-audit', '--no-fund']);
            
            installProcess.output.pipeTo(new WritableStream({
                write(data) {
                    const clean = data.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '').trim();
                    if (clean && !/^[\|\/\-\\]$/.test(clean)) {
                        addBuildLog(clean, "shell");
                    }
                }
            }));
            
            const exitCode = await installProcess.exit;
            if (exitCode !== 0) {
                const msg = "❌ Instalasi gagal. Silakan cek log terminal.";
                addBuildLog(msg, "error");
                alert(msg);
            } else {
                addBuildLog("✅ Instalasi selesai dengan sukses.", "success");
                addBuildLog("💡 Klik '🚀 dev' untuk memulai server lokal.", "info");
                S.isInstalled = true;
                render();
            }
        }

    } else if (cmd === 'dev') {
        if (!hasFiles) {
            const msg = "❌ Virtual workspace masih kosong. Jalankan pembangunan otonom terlebih dahulu.";
            addBuildLog(msg, "error");
            alert(msg);
            return;
        }
        if (!S.isInstalled) {
            const msg = "⚠️ Jalankan 'install' terlebih dahulu!";
            addBuildLog(msg, "amber");
            alert(msg);
            return;
        }
        if (S.isDevRunning) {
            addBuildLog("ℹ️ Dev server sudah berjalan. Klik '🌐 Preview' untuk membukanya.", "info");
            if (window.webcontainerUrl) {
                openLivePreview(window.webcontainerUrl);
            } else {
                alert("⏳ Server sedang booting. Harap tunggu tulisan 'Dev server siap!' di terminal.");
            }
            return;
        }

        if (S.isNative && typeof invoke !== 'undefined') {
            addBuildLog("🚀 Menjalankan 'npm run dev' secara native...", "agent");
            try {
                const targetCwd = S.workspacePath && S.generated && S.generated.name ? `${S.workspacePath}/${S.generated.name}` : ".";
                const isWin = navigator.userAgent.includes('Win');
                const execCmd = isWin ? 'cmd' : 'npm';
                const execArgs = isWin ? ['/c', 'npm', 'run', 'dev'] : ['run', 'dev'];
                
                invoke('execute_command', { cmd: execCmd, args: execArgs, cwd: targetCwd }).catch(err => {
                    addBuildLog(`❌ Error eksekusi dev: ${err}`, "error");
                });
                
                S.isDevRunning = true;
                addBuildLog("✅ Dev server native dimulai! Membuka browser preview...", "success");
                render();
                await sleep(1500);
                openLivePreview();
            } catch (err) {
                addBuildLog(`❌ Error eksekusi: ${err}`, "error");
            }
        } else {
            addBuildLog("🚀 $ npm run dev", "agent");
            if (!window.webcontainerInstance) {
                addBuildLog("❌ WebContainer tidak ditemukan. Mohon ulangi proses install.", "error");
                return;
            }
            
            try {
                let pkgJson = await window.webcontainerInstance.fs.readFile('package.json', 'utf-8');
                let pkg = JSON.parse(pkgJson);
                let modified = false;
                if (!pkg.scripts) pkg.scripts = {};
                
                if (pkg.scripts.dev) {
                    if (pkg.scripts.dev.includes('vite') && !pkg.scripts.dev.includes('--host')) {
                        pkg.scripts.dev = pkg.scripts.dev.replace('vite', 'vite --host');
                        modified = true;
                    }
                    if (pkg.scripts.dev.includes('next dev') && !pkg.scripts.dev.includes('-H')) {
                        pkg.scripts.dev = pkg.scripts.dev.replace('next dev', 'next dev -H 0.0.0.0');
                        modified = true;
                    }
                } else if (pkg.scripts.start) {
                    pkg.scripts.dev = pkg.scripts.start;
                    modified = true;
                } else {
                    pkg.scripts.dev = "npx -y serve -p 3000 .";
                    modified = true;
                }
                
                if (modified) {
                    await window.webcontainerInstance.fs.writeFile('package.json', JSON.stringify(pkg, null, 2));
                    addBuildLog("⚙️ Menyesuaikan konfigurasi server agar dapat diakses...", "info");
                }
            } catch(e) {
                console.log("Could not patch package.json for --host", e);
            }

            const devProcess = await window.webcontainerInstance.spawn('npm', ['run', 'dev']);
            devProcess.output.pipeTo(new WritableStream({
                write(data) {
                    const clean = data.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '').trim();
                    if (clean && !/^[\|\/\-\\]$/.test(clean)) {
                        addBuildLog(clean, "shell");
                    }
                }
            }));
            
            devProcess.exit.then(code => {
                S.isDevRunning = false;
                addBuildLog(`❌ Dev server berhenti tiba-tiba (kode ${code}). Periksa log terminal di atas.`, "error");
                render();
            });
            
            // Server ready akan ditangani di event listener on('server-ready') yang ada di initWebContainer
        }
    }
}

## 🏗️ POLA ARSITEKTUR

### Service Layer Pattern
\`\`\`
Request → Route Handler → Service → Repository → Database
                ↓
         Validation (Zod)
                ↓
         Response DTO
\`\`\`

### Error Handling Standard
\`\`\`typescript
// BENAR — gunakan pola ini
async function fetchUser(id: string): Promise<User> {
  try {
    const user = await db.user.findUnique({ where: { id } });
    if (!user) throw new NotFoundError(\`User \${id} tidak ditemukan\`);
    return user;
  } catch (error) {
    logger.error({ error, userId: id }, 'fetchUser gagal');
    throw error; // re-throw, jangan telan error
  }
}

// SALAH — jangan lakukan ini
async function fetchUser(id: string) {
  return await db.user.findUnique({ where: { id } }); // ❌ no error handling
}
\`\`\`

### Validasi Input (gunakan Zod)
\`\`\`typescript
const CreateUserSchema = z.object({
  email: z.string().email('Email tidak valid'),
  password: z.string().min(8, 'Password minimal 8 karakter'),
  name: z.string().min(2).max(50),
});

// Di API route:
const parsed = CreateUserSchema.safeParse(req.body);
if (!parsed.success) return res.status(400).json({ errors: parsed.error.issues });
\`\`\`

## 🚫 ANTI-PATTERNS — JANGAN LAKUKAN

\`\`\`typescript
// ❌ Hardcode secret
const apiKey = "sk-12345abcde";

// ✅ Gunakan env variable
const apiKey = process.env.API_KEY!;
if (!apiKey) throw new Error('API_KEY tidak diset');

// ❌ Any type
function process(data: any) { ... }

// ✅ Typed properly
function process(data: ProcessInput): ProcessOutput { ... }

// ❌ Nested callback hell
fetchUser(id, (user) => {
  fetchOrders(user.id, (orders) => { ... });
});

// ✅ Async/await
const user = await fetchUser(id);
const orders = await fetchOrders(user.id);
\`\`\`

      // Powerfull Auto-Switch & Retry Logic for OpenRouter Free (Updated 2026)
      const freeFallbacks = [

        'qwen/qwen3.6-plus:free',
        'qwen/qwen3-coder:free',

      ];
      
      async function attemptRequest(currentModel) {
          const body = {
            model: currentModel,
            messages: [
              {role: 'system', content: systemPrompt},
              {role: 'user', content: userPrompt}
            ],
            max_tokens: 4000,
            temperature: 0.3,
            response_format: {type: 'json_object'}
          };

          // 1. Handle Puter.js Case (Keyless)
          if (S.aiConfig.provider === 'puter') {
              console.log('[AI] Using Puter.js for generation...');
              // Combine system and user prompts for better compatibility with Puter.js v2 SDK
              const combinedPrompt = `${systemPrompt}\n\nUser Request:\n${userPrompt}`;
              
              try {
                  const response = await puter.ai.chat(combinedPrompt, {
                      model: currentModel
                  });
                  
                  if (!response) throw new Error('Puter returned empty response.');

                  console.log('[AI] Puter.js success:', response.toString().substring(0, 50) + '...');

                  // Normalize Puter response to match fetch-like structure
                  return {
                      ok: true,
                      status: 200,
                      json: async () => ({ choices: [{ message: { content: response.toString() } }] })
                  };
              } catch (err) {
                  console.error('[AI ERROR] Puter JS Failed:', err);
                  throw err; // Re-throw to be caught by the outer catch block
              }
          }

          // 2. Handle Proxy/Direct Fetch Case
          if (S.aiConfig.useProxy) {
            return await fetch('/api/ai-proxy', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                provider: S.aiConfig.provider,
                apiUrl: `${provCfg.baseUrl}/chat/completions`,
                apiKey: S.aiConfig.apiKey,
                payload: body
              })
            });

                ...(S.aiConfig.provider==='openrouter' ? {
                  'HTTP-Referer': 'https://devforge.studio',
                  'X-Title': 'DevForge Studio'
                } : {})
              },
              body: JSON.stringify(body)
            });
          }
      }

      let res = await attemptRequest(S.aiConfig.model);

                  console.log(`Auto-Switch success! Used: ${fallback}`);
                  break;
              }
          }

      document.getElementById('aiLoadingBanner')?.remove();

      if(res.ok){

        const content = data.choices?.[0]?.message?.content || '{}';
        let parsed = {};
        try { parsed = JSON.parse(content); } catch(e) {
          // Fallback: try to extract JSON from markdown
          const match = content.match(/```json\n?([\s\S]*?)\n?```/);
          if(match) try { parsed = JSON.parse(match[1]); } catch(e2){}
        }

        if(parsed.database_schema) folder.file('AI_database_schema.md',

function updateAIStatus(state, msg, detail){
  const dot = document.getElementById('aiDot');
  const txt = document.getElementById('aiStatusText');
  if(!dot||!txt) return;
  dot.className = 'ai-dot';
  if(state==='loading'){ dot.classList.add('yellow'); txt.textContent = '⏳ Menguji koneksi...'; }
  else if(state==='ok'){ dot.classList.add('green'); txt.textContent = msg || '✅ Koneksi berhasil!'; }
  else if(state==='err'){ 
    dot.classList.add('red'); 
    txt.innerHTML = `<span style="color:var(--red)">❌ Gagal: ${msg}</span>${detail?`<div style="font-size:10px;margin-top:4px;opacity:0.7">${detail}</div>`:''}`; 
  }
  else { 
    const prov = S.aiConfig.provider;
    txt.textContent = prov === 'puter' ? 'Puter.js siap digunakan tanpa API Key' : (S.aiConfig.apiKey ? '🔑 API Key tersedia — klik "Tes Koneksi"' : 'Masukkan API Key dan tes koneksi.');
    if (prov === 'puter') dot.classList.add('green');
  }
}

async function testAPIKey(){
  const provKey = S.aiConfig.provider;
  const prov = AI_PROVIDERS[provKey];
  const requiresKey = prov?.requiresKey !== false;
  const key = document.getElementById('aiKeyInput')?.value || S.aiConfig.apiKey;
  if(requiresKey && !key){ updateAIStatus('err','⚠️ API Key kosong.'); return; }
  S.aiConfig.apiKey = key;
  updateAIStatus('loading');
  
  const apiUrl = `${prov.baseUrl}/chat/completions`;
  const internalProxyUrl = '/api/ai-proxy';

  const freeFallbacks = [
    'openrouter/free',
    'google/gemma-3-27b-it:free',
    'qwen/qwen3.6-plus:free',
    'qwen/qwen3-coder:free',
    'google/gemma-3-4b-it:free'
  ];

  async function attemptTest(modelId) {
      const payload = {
          model: modelId,
          messages:[{role:'user',content:'Say OK'}],
          max_tokens: 15
      };

      if (S.aiConfig.provider === 'puter') {
          try {
              const response = await puter.ai.chat("Say OK", { model: modelId });
              if (!response) throw new Error('Puter returned empty response.');
              return { ok: true, status: 200, json: async () => ({ id: 'puter-test', choices: [{ message: { content: response.toString() } }] }) };
          } catch (err) { throw err; }
      }

      if (S.aiConfig.useProxy) {
          return await fetch(internalProxyUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ provider: S.aiConfig.provider, apiUrl: apiUrl, apiKey: key, payload: payload })
          });
      } else {
          return await fetch(apiUrl, {
              method: 'POST',
              headers: {
                  'Authorization': `Bearer ${key}`,
                  'Content-Type': 'application/json',
                  ...(S.aiConfig.provider==='openrouter' ? { 'HTTP-Referer': 'https://devforge.studio', 'X-Title': 'DevForge Studio' } : {})
              },
              body: JSON.stringify(payload)
          });
      }
  }

  try {
    let res = await attemptTest(S.aiConfig.model);
    if (res.status === 429 && S.aiConfig.provider === 'openrouter' && S.aiConfig.model.endsWith(':free')) {
        for (const fallback of freeFallbacks) {
            if (fallback === S.aiConfig.model) continue;
            updateAIStatus('loading', `⏳ Rate Limit! Mencoba cadangan: ${fallback.split('/').pop()}...`);
            res = await attemptTest(fallback);
            if (res.ok) {
                S.aiConfig.connected = true;
                const sel = document.getElementById('aiModelSel');
                if(sel) sel.value = fallback;
                S.aiConfig.model = fallback;
                updateAIStatus('ok', `✅ Berhasil Auto-Switch ke: ${fallback.split('/').pop()}`);
                return;
            }
        }
    }

    if(!res.ok){ 
      let bodyData = {};
      try { bodyData = await res.json(); } catch(e){}
      const errDetail = bodyData.error?.message || bodyData.message || res.statusText;
      throw new Error(`Server returned ${res.status}: ${errDetail}`);
    }
    
    const data = await res.json();
    if(data.choices?.[0] || data.id){
      S.aiConfig.connected = true;
      updateAIStatus('ok', `✅ Terhubung! Model: ${S.aiConfig.model.split('/').pop()}`);
    } else {
       throw new Error('Format respons tidak dikenal.');
     }
  } catch(err){
    S.aiConfig.connected = false;
    updateAIStatus('err', err.message);
  }
}

function openLivePreview(urlOverride, forceNewTab = false) {
    if (urlOverride || window.webcontainerUrl) {
        const targetUrl = urlOverride || window.webcontainerUrl;
        const iframe = document.getElementById('previewIframe');
        if (iframe && !forceNewTab) {
            addBuildLog(`Memuat WebContainer preview di dalam panel...`, "info");
            if (iframe.src !== targetUrl) iframe.src = targetUrl;
            return;
        }

        addBuildLog(`Membuka WebContainer URL di Tab Baru: ${targetUrl}`, "info");
        const w = window.open(targetUrl, '_blank');
        if(!w) alert('Mohon izinkan pop-up di browser Anda untuk melihat preview WebContainer.');
        return;
    }

    const workspace = S.virtualWorkspace || {};
    
    // Cegah fallback blob jika workspace punya package.json (butuh WebContainer)
    if (workspace['package.json']) {
        if (!S.isInstalled) {
            S.autoDeploying = true;
            render();
            addBuildLog("⚡ Mengotomatisasi proses instalasi dan persiapan server untuk Anda...", "agent");
            execTerminalCmd('install').then(() => {
                if (S.isInstalled) {
                    addBuildLog("⚡ Instalasi selesai, langsung menjalankan server...", "agent");
                    execTerminalCmd('dev').then(() => {
                        S.autoDeploying = false;
                        render();
                    });
                } else {
                    S.autoDeploying = false;
                    render();
                }
            }).catch(() => {
                S.autoDeploying = false;
                render();
            });
            return;
        }
        if (!S.isDevRunning) {
            addBuildLog("⚡ Menyalakan server secara otomatis...", "agent");
            execTerminalCmd('dev');
            return;
        }
        const msg = "Server sedang memulai... Harap tunggu hingga muncul log 'Dev server siap' di terminal sebelum membuka Preview.";
        addBuildLog(msg, "info");
        alert(msg);
        return;
    }

    let content = workspace['index.html'] || workspace['public/index.html'] || workspace['src/index.html'];

    if (!content) {
        const htmlFile = Object.keys(workspace).find(k => k.endsWith('.html'));
        if (htmlFile) content = workspace[htmlFile];
    }

    if (!content || content.trim().length === 0) {
        if(Object.keys(workspace).length === 0) {
            const msg = "ERROR: Virtual Workspace masih kosong. Silakan klik tombol '🚀 Mulai Pembangunan Otonom' terlebih dahulu.";
            addBuildLog(msg, "error");
            alert(msg);
        } else {
            const msg = "ERROR: File HTML utama (index.html) tidak ditemukan atau kosong. Harap tunggu AI selesai.";
            addBuildLog(msg, "error");
            alert(msg);
        }
        return;
    }

    // ── Deteksi apakah sebuah JS content menggunakan ES Module ──
    const isESModule = (code) => /^\s*(import\s|export\s)/m.test(code);

    // ── Inject CSS dari virtual workspace sebagai <style> inline ──
    // (CSS eksternal tidak bisa dimuat dari blob URL karena path relatif tidak berlaku)
    let inlineStyles = '';
    Object.keys(workspace).forEach(path => {
        if (path.endsWith('.css')) {
            inlineStyles += `\n<style>/* ${path} */\n${workspace[path]}\n</style>`;
        }
    });

    // ── Inject JS dari virtual workspace sebagai <script> inline ──
    // Gunakan type="module" jika JS tersebut mengandung import/export
    const skipPatterns = [/vite\.config/, /astro\.config/, /tailwind\.config/, /postcss\.config/, /next\.config/];
    let inlineScripts = '';
    Object.keys(workspace).forEach(path => {
        if (path.endsWith('.js') || path.endsWith('.ts')) {
            const skip = skipPatterns.some(p => p.test(path));
            if (!skip) {
                const jsCode = workspace[path] || '';
                const modType = isESModule(jsCode) ? ' type="module"' : '';
                inlineScripts += `\n<script${modType}>/* ${path} */\n${jsCode}\n<\/script>`;
            }
        }
    });

    let finalContent = content;

    // ── Hapus hanya <link stylesheet> karena CSS sudah di-inject inline ──
    // Pertahankan <script src> yang sudah ada di HTML (jangan dihapus)
    finalContent = finalContent.replace(/<link[^>]+rel=["']stylesheet["'][^>]*>/gi, '');

    // ── Jika ada <script src="./xxx.js"> yang merujuk ke file dalam workspace,
    //    ganti dengan inline script yang sudah benar type-nya ──
    finalContent = finalContent.replace(/<script([^>]*)\s+src=["']([^"']+)["']([^>]*)><\/script>/gi, (match, pre, src, post) => {
        // Normalisasi path: hapus ./ atau / di depan
        const normalizedSrc = src.replace(/^\.?\//, '');
        const jsCode = workspace[normalizedSrc] || workspace[src];
        if (jsCode !== undefined) {
            const existingAttrs = (pre + post).trim();
            // Jika sudah ada type="module" atau JS-nya pakai import, pakai module
            const needsModule = isESModule(jsCode) || /type=["']module["']/.test(existingAttrs);
            const modAttr = needsModule ? ' type="module"' : '';
            return `<script${modAttr}>/* ${normalizedSrc} */\n${jsCode}\n<\/script>`;
        }
        // Jika file tidak ada di workspace, biarkan tag aslinya
        return match;
    });

    // ── Sisipkan style inline tepat sebelum </head> ──
    if (inlineStyles) {
        finalContent = finalContent.includes('</head>')
            ? finalContent.replace('</head>', inlineStyles + '\n</head>')
            : inlineStyles + finalContent;
    }

    // ── Sisipkan script inline tepat sebelum </body>
    //    hanya jika tidak ada <script src> yang sudah di-resolve di atas ──
    const hasExistingScripts = /<script[^>]*>[\s\S]*?<\/script>/i.test(finalContent);
    if (inlineScripts && !hasExistingScripts) {
        finalContent = finalContent.includes('</body>')
            ? finalContent.replace('</body>', inlineScripts + '\n</body>')
            : finalContent + inlineScripts;
    }

    addBuildLog("Memuat URL Blob Preview...", "info");
    const blob = new Blob([finalContent], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    
    const iframe = document.getElementById('previewIframe');
    if (iframe) {
        iframe.src = url;
    } else {
        window.open(url, '_blank');
    }
}

function resetBuilder() {
    if (confirm("Apakah Anda yakin ingin mereset progress pembangunan otonom? Semua kode yang digenerate akan dihapus.")) {
        S.virtualWorkspace = {};
        S.buildLogs = [];
        S.building = false;
        S.activeAgent = null;
        S.activeFile = null;
        S.isInstalled = false;
        S.isDevRunning = false;
        S.agentStatus = {
            architect: 'idle',
            coder: 'idle',
            qa: 'idle',
            security: 'idle',
            polisher: 'idle',
            tester: 'idle',
            devops: 'idle',
            feature: 'idle',
            content: 'idle'
        };
        try {
            localStorage.removeItem('devforge_logs');
            localStorage.removeItem('devforge_workspace');
        } catch(e) {}
        saveWorkspaceToLocal();
        render();
    }
}

    if(!S.aiConfig.enabled || !S.aiConfig.connected){
        const runSim = confirm("⚠️ AI Settings belum aktif atau belum terhubung.\n\nApakah Anda ingin menjalankan Mode Simulasi Otonom (Non-AI) secara luring?\nSistem tetap akan memvisualisasikan alur kerja 4 Agen AI dan menghasilkan kode fungsional untuk proyek Anda.");
        if (runSim) {
            S.building = true;
